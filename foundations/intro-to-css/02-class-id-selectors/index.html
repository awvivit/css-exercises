<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Class and ID Selectors</title>
    <link rel="stylesheet" href="style.css">
  </head>
  <body>
    <p id="element_1" class="odd">Number 1 - I'm a class!</p>
    <div id="element_2" class="">Number 2 - I'm one ID.</div>
    <p id="element_3" class="odd adjust-font-size-24px">Number 3 - I'm a class, but cooler!</p>
    <div id="element_4" class="adjust-font-size-24px">Number 4 - I'm another ID.</div>
    <p id="element_5" class="odd">Number 5 - I'm a class!</p>
   
  </body>
</html>
